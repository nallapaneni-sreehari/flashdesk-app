networks:
  flashdesk-net:
    driver: bridge
    name: flashdesk-net

volumes:
  pgdata:
  redisdata:

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  # Not exposed to the VM host — only reachable inside flashdesk-net
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    networks:
      - flashdesk-net
    environment:
      POSTGRES_USER: flashdesk
      POSTGRES_PASSWORD: flashdesk_secret
      POSTGRES_DB: flashdesk
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashdesk -d flashdesk"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (BullMQ) ─────────────────────────────────────────────────────────
  # Not exposed to the VM host — only reachable inside flashdesk-net
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - flashdesk-net
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ────────────────────────────────────────────────────────────
  # Not exposed to the VM host — Nginx proxies /api/ to it inside the network
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - flashdesk-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://flashdesk:flashdesk_secret@postgres:5432/flashdesk
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 24h
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      INBOUND_EMAIL_ADDRESS: ${INBOUND_EMAIL_ADDRESS}
    # Run DB migrations before starting the server
    command: sh -c "npx prisma migrate deploy && node src/app.js"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/setup/check || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Frontend (Angular + Nginx) ─────────────────────────────────────────────
  # The ONLY service exposed to the VM host.
  # Nginx proxies /api/ and /socket.io/ to the backend inside flashdesk-net.
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - flashdesk-net
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "2727:80"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
