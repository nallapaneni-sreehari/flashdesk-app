<p-dialog [header]="dialogTitle" [(visible)]="visible" [modal]="true" [closable]="true" [draggable]="false"
    [resizable]="false" [style]="{ width: '500px' }" (onHide)="close()">

    <div class="flex flex-col gap-5">
        <!-- Basic Info -->
        <div>
            <h4 class="mb-3 text-sm font-semibold text-(--text-primary) flex items-center gap-2">
                <i class="pi pi-user text-(--text-muted)"></i>
                Basic Information
            </h4>
            <div class="flex flex-col gap-1">
                <label class="text-xs font-medium text-(--text-secondary)">Full Name *</label>
                <input pInputText [(ngModel)]="name" placeholder="Sarah Johnson" class="w-full" />
            </div>
        </div>

        <!-- Contact Details -->
        <div>
            <h4 class="mb-3 text-sm font-semibold text-(--text-primary) flex items-center gap-2">
                <i class="pi pi-envelope text-(--text-muted)"></i>
                Contact Details
            </h4>
            <div class="grid grid-cols-1 gap-4">
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-medium text-(--text-secondary)">Email Address *</label>
                    <input pInputText [(ngModel)]="email" placeholder="sarah@company.com" type="email"
                        class="w-full" />
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-medium text-(--text-secondary)">Phone Number
                        <span class="text-(--text-muted)">(optional)</span>
                    </label>
                    <input pInputText [(ngModel)]="phone" placeholder="+1 555-000-0000" class="w-full" />
                </div>
            </div>
        </div>

        <!-- Info Note -->
        <div class="rounded-lg bg-(--bg-elevated) p-3 flex items-start gap-2">
            <i class="pi pi-info-circle text-(--text-muted) mt-0.5"></i>
            <p class="text-xs text-(--text-secondary)">
                @if (isEditing) {
                Changes will be applied immediately to the customer profile.
                } @else {
                The customer will be able to create support tickets and access the customer portal.
                }
            </p>
        </div>
    </div>

    <ng-template pTemplate="footer">
        <div class="flex justify-end gap-2">
            <p-button label="Cancel" [outlined]="true" severity="secondary" (onClick)="close()" />
            <p-button [label]="isEditing ? 'Save Changes' : 'Create Customer'"
                [icon]="isEditing ? 'pi pi-check' : 'pi pi-plus'" [disabled]="!isFormValid"
                (onClick)="submit()" />
        </div>
    </ng-template>
</p-dialog>
